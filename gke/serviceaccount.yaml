apiVersion: v1
kind: ServiceAccount
metadata:
  name: ferentin-edge
  namespace: ferentin
  annotations:
    # Bind this KSA to a GCP service account via Workload Identity.
    # Replace GSA_NAME@PROJECT_ID.iam.gserviceaccount.com with the GCP SA you
    # created and granted IAM roles to. The pod will resolve GCP credentials
    # (Vertex AI, Cloud Storage, etc.) at runtime via the GKE metadata server.
    iam.gke.io/gcp-service-account: GSA_NAME@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: service-edge
    app.kubernetes.io/component: identity
