apiVersion: v1
kind: Service
metadata:
  name: service-edge
  namespace: ferentin
  annotations:
    # Tell the GKE L7 LB to use the BackendConfig defined in backendconfig.yaml
    # (custom health check path on the HTTP listener).
    cloud.google.com/backend-config: '{"default":"service-edge-backend"}'
    # Use HTTP2 for the LB-to-backend leg if you want gRPC; default is HTTP1.
    cloud.google.com/app-protocols: '{"https":"HTTPS"}'
  labels:
    app.kubernetes.io/name: service-edge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: service-edge
  ports:
    - name: https
      port: 9443
      targetPort: 9443
      protocol: TCP
