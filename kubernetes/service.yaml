apiVersion: v1
kind: Service
metadata:
  name: service-edge
  namespace: ferentin-service-edge
  labels:
    app.kubernetes.io/name: service-edge
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 9443
      targetPort: 9443
      protocol: TCP
    # Port 9080 is internal-only (health checks). Not exposed via Service.
  selector:
    app.kubernetes.io/name: service-edge
